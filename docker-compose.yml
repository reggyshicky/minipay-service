services:
  postgres:
    image: postgres:16-alpine
    container_name: minipay-postgres
    environment:
      POSTGRES_DB: minipay_db
      POSTGRES_USER: minipay_user
      POSTGRES_PASSWORD: minipay_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minipay_user -d minipay_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minipay-backend
    ports:
      - "3271:3271"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/minipay_db
      DATABASE_USERNAME: minipay_user
      DATABASE_PASSWORD: minipay_pass
      JWT_SECRET: ${JWT_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-sandbox}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minipay-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
