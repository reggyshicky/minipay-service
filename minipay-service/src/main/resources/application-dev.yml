spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/minipay_db
    username: minipay_user
    password: minipay_passwd
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
sms:
  provider: console

logging:
  level:
    com.minipay: DEBUG